name: MPI Dijkstra CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MPI Library
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin libopenmpi-dev

    - name: Compile MPI Project (CI Mode)
      run: |
        # Dọn dẹp sạch bản build cũ và biên dịch mới với cờ OpenMP
        make clean
        make

    - name: Run Dijkstra Verification (NP = 1)
      run: |
        mpirun --oversubscribe -np 1 ./parallel_dijkstra_opt

    - name: Run Dijkstra Verification (NP = 2)
      run: |
        mpirun --oversubscribe -np 2 ./parallel_dijkstra_opt

    - name: Run Dijkstra Verification (NP = 4)
      run: |
        mpirun --oversubscribe -np 4 ./parallel_dijkstra_opt